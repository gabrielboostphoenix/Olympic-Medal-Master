<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/css/style.css" type="text/css">
    <title>Olympic Medals</title>
</head>
<body>
    <header>
        <div class="container">
            <div class="linha">
                <div class="coluna">
                    <figure>
                        <img src="./src/img/logo.png" alt="Logo Olímpiadas de Programação Web">
                    </figure>
                </div>
                <div class="coluna">
                    <h1>Olímpiadas <abbr title="HyperText Markup Language">HTML</abbr>, <abbr title="Cascading Style Sheet">CSS</abbr> e <abbr title="JavaScript">JS</abbr></h1>
                </div>
            </div>
        </div>
    </header>
    <main>
        <div class="container">
            <article>
                <header>
                    <div class="linha">
                        <div class="coluna coluna-rank">
                            <span>Rank</span>
                        </div>
                        <div class="coluna coluna-country">
                            <span>Country</span>
                        </div>
                        <div class="coluna coluna-medalha">
                            <span>G</span>
                        </div>
                        <div class="coluna coluna-medalha">
                            <span>S</span>
                        </div>
                        <div class="coluna coluna-medalha">
                            <span>B</span>
                        </div>
                        <div class="coluna coluna-total">
                            <span>Total</span>
                        </div>
                    </div>
                </header>
                <section id="quadro">
                </section>
            </article>
        </div>
    </main>
    <script src="./src/js/script.js" type="text/javascript"></script>
</body>
</html>
